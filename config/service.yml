# 顧客ごとの公開可能な設定をまとめるファイルです。
# パスワード、アクセストークン、Personal Access Tokenは書かないでください。

service:
  name: Threads ChatGPT Autopilot
  timezone: Asia/Tokyo
  language: ja

threads:
  account_label: your_threads_account

posting:
  # GitHub Actionsは10分ごとに起動し、ここで定義した時刻を確認します。
  time_slots:
    morning: "07:00"
    noon: "12:00"
    evening: "20:00"

  # Actionsの開始遅延を吸収する確認幅です。
  due_window_minutes: 30
  default_status: draft
  enable_threads: true
  enable_images: false

assets:
  # 画像付き投稿を使う場合のみ設定します。
  # 例: your-github-name/your-threads-assets
  repository: ""
  branch: main
  public_subdirectory: assets/webp
  webp_quality: 86

support:
  operator_name: ""
  support_contact: ""
