# 顧客ごとの公開可能な設定です。認証情報は保存しません。

service:
  name: Threads ChatGPT Autopilot
  timezone: Asia/Tokyo
  language: ja

threads:
  account_label: your_threads_account

posting:
  # 自動投稿で使用する投稿枠です。
  # 時刻を追加・変更すると、同期workflowがGitHub Actionsのcronを自動更新します。
  time_slots:
    morning: "07:00"
    noon: "12:00"
    afternoon: "15:00"
    evening: "17:00"
    night: "20:00"
    summary: "21:00"

  # 各投稿時刻に対してActionsを起動する相対分です。
  # 例：20:00なら19:57、20:02、20:07に起動します。
  schedule_offsets_minutes:
    - -3
    - 2
    - 7

  default_delay_min_minutes: 0
  default_delay_max_minutes: 0
  overdue_grace_minutes: 15
  default_thread_delay_min_seconds: 8
  default_thread_delay_max_seconds: 25

  default_status: draft
  enable_threads: false
  enable_images: false

assets:
  repository: ""
  branch: main
  public_subdirectory: assets/webp
  webp_quality: 86

support:
  operator_name: ""
  support_contact: ""
