name: Validate Template

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python
        run: python -m compileall -q src tests

      - name: Run scheduler tests
        run: python -m unittest discover -s tests -v

      - name: Validate configuration and schedules
        run: python -m src.validate_repository

      - name: Validate Threads text length
        run: python -m src.validate_text_lengths
