name: Process Threads Images

on:
  push:
    paths:
      - "incoming/images/**"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate incoming images without changing files"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  issues: write

concurrency:
  group: threads-process-images
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout autopilot repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: autopilot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: autopilot
        run: pip install -r requirements.txt

      - name: Validate incoming images only
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        working-directory: autopilot
        run: python -m src.process_images --dry-run

      - name: Validate image repository access
        id: image_preflight
        if: github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true'
        working-directory: autopilot
        env:
          ASSETS_REPO_FULL_NAME: ${{ vars.ASSETS_REPO_FULL_NAME }}
          ASSETS_REPO_BRANCH: ${{ vars.ASSETS_REPO_BRANCH || 'main' }}
          ASSETS_REPO_TOKEN: ${{ secrets.ASSETS_REPO_TOKEN }}
        run: python -m src.image_delivery_preflight

      - name: Checkout public assets repository
        if: success() && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true') && steps.image_preflight.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.image_preflight.outputs.repository }}
          ref: ${{ steps.image_preflight.outputs.branch }}
          token: ${{ secrets.ASSETS_REPO_TOKEN }}
          path: autopilot/assets-repo

      - name: Convert images and update schedules
        if: success() && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true') && steps.image_preflight.outputs.enabled == 'true'
        working-directory: autopilot
        run: python -m src.process_images
        env:
          ASSETS_REPO_FULL_NAME: ${{ steps.image_preflight.outputs.repository }}
          ASSETS_REPO_BRANCH: ${{ steps.image_preflight.outputs.branch }}

      - name: Commit public images
        if: success() && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true') && steps.image_preflight.outputs.enabled == 'true'
        working-directory: autopilot/assets-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No public image changes."
          else
            git commit -m "chore: add Threads posting image"
            git push
          fi

      - name: Commit image processing results
        if: success() && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true') && steps.image_preflight.outputs.enabled == 'true'
        working-directory: autopilot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A incoming/images posts config
          if git diff --cached --quiet; then
            echo "No autopilot image changes."
          else
            git commit -m "chore: process Threads posting image"
            git push
          fi

      - name: Create or update failure issue
        if: failure()
        uses: actions/github-script@v7
        env:
          IMAGE_ERROR_KIND: ${{ steps.image_preflight.outputs.error_kind }}
          IMAGE_ERROR_STATUS: ${{ steps.image_preflight.outputs.status_code }}
        with:
          script: |
            const title = 'Threads image processing workflow failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const errorKind = process.env.IMAGE_ERROR_KIND || 'image_workflow';
            const statusCode = process.env.IMAGE_ERROR_STATUS || '';
            const body = [
              `Workflow run ${context.runNumber} failed.`,
              '',
              `Run: ${runUrl}`,
              `Error kind: ${errorKind}`,
              statusCode ? `HTTP status: ${statusCode}` : '',
              '',
              'No image conversion or schedule update should be retried until the cause is confirmed.',
              'Check ASSETS_REPO_FULL_NAME, ASSETS_REPO_BRANCH, and whether ASSETS_REPO_TOKEN is registered with access to the one public image repository.',
              'Do not paste the token value into this Issue, chat, email, or logs.',
            ].filter(Boolean).join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(issue =>
              !issue.pull_request && issue.title === title
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
