name: Test Post Search

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/search_posts.py"
      - "tests/test_search_posts.py"
      - ".github/workflows/test-post-search.yml"
  pull_request:
    paths:
      - "src/search_posts.py"
      - "tests/test_search_posts.py"
      - ".github/workflows/test-post-search.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run search unit tests
        run: python -m unittest discover -s tests -p "test_search_posts.py" -v
