name: Post Due Threads Posts

on:
  schedule:
    # Runs every 10 minutes. Python checks config/service.yml for actual slots.
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check due posts without publishing"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write
  issues: write

concurrency:
  group: threads-post-due
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post due entries
        run: |
          ARGS=()
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python -m src.post_due "${ARGS[@]}"
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}

      - name: Commit posting results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/schedule.yml posts/schedules posts/posted_log.yml
          if git diff --cached --quiet; then
            echo "No posting result changes."
          else
            git commit -m "chore: record Threads posting result"
            git push
          fi

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Threads posting failed: run ${context.runNumber}`;
            const body = [
              'The scheduled Threads posting workflow failed.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Check:',
              '- Actions logs',
              '- THREADS_ACCESS_TOKEN and THREADS_USER_ID are registered',
              '- config/service.yml time slots',
              '- posts/schedules status and error fields',
              '- image_url is publicly accessible when using images',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
