name: Post Due Threads Posts

on:
  schedule:
    # Avoid minute 0 and check every five minutes.
    - cron: '2-57/5 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check one candidate without API calls or YAML updates"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      audit_overdue:
        description: "List overdue ready posts for manual classification"
        required: false
        default: false
        type: boolean
      post_id:
        description: "Optional exact post ID for deliberate manual execution"
        required: false
        default: ""
        type: string
      allow_out_of_order:
        description: "Allow an older post when a later post in the same series is posted"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

concurrency:
  group: threads-post-due
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process one due entry
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_AUDIT_OVERDUE: ${{ inputs.audit_overdue }}
          INPUT_POST_ID: ${{ inputs.post_id }}
          INPUT_ALLOW_OUT_OF_ORDER: ${{ inputs.allow_out_of_order }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: |
          ARGS=()
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_AUDIT_OVERDUE" = "true" ]; then
            ARGS+=(--audit-overdue)
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -n "$INPUT_POST_ID" ]; then
            ARGS+=(--post-id "$INPUT_POST_ID")
          fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INPUT_ALLOW_OUT_OF_ORDER" = "true" ]; then
            ARGS+=(--allow-out-of-order)
          fi
          python -m src.post_due "${ARGS[@]}"

      - name: Commit posting progress
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts/schedule.yml posts/schedules posts/posted_log.yml
          if git diff --cached --quiet; then
            echo "No posting progress changes."
          else
            git commit -m "chore: record Threads posting progress"
            git push
          fi

      - name: Create failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Threads posting failed: run ${context.runNumber}`;
            const body = [
              'The Threads posting workflow failed.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Check:',
              '- Actions logs',
              '- posting.enable_threads',
              '- THREADS_ACCESS_TOKEN and THREADS_USER_ID registration',
              '- scheduled_at, publish_after, status and thread_progress',
              '- public image URLs when using images',
              '',
              'Do not paste Secret values into the issue.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
