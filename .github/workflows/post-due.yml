name: Post Due Threads Posts

on:
  schedule:
    # BEGIN AUTO-GENERATED POSTING SCHEDULE
    - cron: '57 2 * * *'
    - cron: '2 3 * * *'
    - cron: '7 3 * * *'
    - cron: '57 5 * * *'
    - cron: '2 6 * * *'
    - cron: '7 6 * * *'
    - cron: '57 7 * * *'
    - cron: '2 8 * * *'
    - cron: '7 8 * * *'
    - cron: '57 10 * * *'
    - cron: '2 11 * * *'
    - cron: '7 11 * * *'
    - cron: '57 11 * * *'
    - cron: '2 12 * * *'
    - cron: '7 12 * * *'
    - cron: '57 21 * * *'
    - cron: '2 22 * * *'
    - cron: '7 22 * * *'
    # END AUTO-GENERATED POSTING SCHEDULE
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Check one candidate without API calls or YAML updates"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      audit_overdue:
        description: "List overdue ready posts for manual classification"
        required: false
        default: false
        type: boolean
      post_id:
        description: "Optional exact post ID for deliberate manual execution"
        required: false
        default: ""
        type: string
      allow_out_of_order:
        description: "Allow an older post when a later post in the same series is posted"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  issues: write

concurrency:
  group: threads-post-due
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process scheduled candidate
        if: github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE_GITHUB_CHECKPOINTS: "true"
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python -m src.post_due

      - name: Process manual request
        if: github.event_name == 'workflow_dispatch'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENABLE_GITHUB_CHECKPOINTS: "true"
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          INPUT_AUDIT_OVERDUE: ${{ inputs.audit_overdue }}
          INPUT_POST_ID: ${{ inputs.post_id }}
          INPUT_ALLOW_OUT_OF_ORDER: ${{ inputs.allow_out_of_order }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: |
          ARGS=()
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          if [ "$INPUT_AUDIT_OVERDUE" = "true" ]; then
            ARGS+=(--audit-overdue)
          fi
          if [ -n "$INPUT_POST_ID" ]; then
            ARGS+=(--post-id "$INPUT_POST_ID")
          fi
          if [ "$INPUT_ALLOW_OUT_OF_ORDER" = "true" ]; then
            ARGS+=(--allow-out-of-order)
          fi
          python -m src.post_due "${ARGS[@]}"

      - name: Upload failure recovery snapshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: threads-posting-recovery-${{ github.run_id }}
          path: |
            posts/schedules/*.yml
            posts/posted_log.yml
          if-no-files-found: warn
          retention-days: 14

      - name: Report workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Threads posting workflow failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactName = `threads-posting-recovery-${context.runId}`;
            const body = [
              `Workflow run ${context.runNumber} failed.`,
              '',
              `Run: ${runUrl}`,
              `Recovery artifact: ${artifactName}`,
              '',
              'Do not rerun the failed post until the Threads screen, Actions log, and recovery artifact are reconciled.',
              'Check status, error_kind, recovery_action, threads_post_id, and thread_post_ids.',
              'Do not place authentication values in this issue.',
            ].join('\n');

            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find(issue =>
              !issue.pull_request && issue.title === title
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
