name: Test Posting Schedule Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/sync_post_schedule.py"
      - "tests/test_sync_post_schedule.py"
      - "config/service.yml"
      - ".github/workflows/post-due.yml"
      - ".github/workflows/sync-post-schedule.yml"
      - ".github/workflows/test-sync-post-schedule.yml"
  pull_request:
    paths:
      - "src/sync_post_schedule.py"
      - "tests/test_sync_post_schedule.py"
      - "config/service.yml"
      - ".github/workflows/post-due.yml"
      - ".github/workflows/sync-post-schedule.yml"
      - ".github/workflows/test-sync-post-schedule.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run schedule sync tests
        run: python -m unittest discover -s tests -p "test_sync_post_schedule.py" -v

      - name: Confirm generated workflow is synchronized
        run: python -m src.sync_post_schedule --check
