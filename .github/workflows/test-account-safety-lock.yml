name: Test Account Safety Lock

on:
  workflow_dispatch:
  push:
    paths:
      - "src/post_due.py"
      - "config/service.yml"
      - "tests/test_account_safety_lock.py"
      - ".github/workflows/test-account-safety-lock.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run account safety lock tests
        run: python -m unittest discover -s tests -p "test_account_safety_lock.py" -v
