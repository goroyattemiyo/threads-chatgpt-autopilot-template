name: Test Thread Failure Recovery

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/post_daily.py"
      - "src/post_due.py"
      - "src/schedule_store.py"
      - "tests/test_thread_failure_recovery.py"
      - ".github/workflows/test-thread-failure-recovery.yml"
  pull_request:
    paths:
      - "src/post_daily.py"
      - "src/post_due.py"
      - "src/schedule_store.py"
      - "tests/test_thread_failure_recovery.py"
      - ".github/workflows/test-thread-failure-recovery.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run thread failure and recovery tests
        run: python -m unittest discover -s tests -p "test_thread_failure_recovery.py" -v
